<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Test</title>
</head>
<body>

<!-- START OF TEST -->

<h1>Simple Math Test</h1>

<!-- Name field -->
<label for="name">Enter your name:</label><br>
<input type="text" id="name" name="name"><br><br>

<form>

    <!-- Question 1 -->
    <p>1. What is 5 + 3?</p>
    <input type="radio" name="q1" value="6"> 6<br>
    <input type="radio" name="q1" value="8"> 8<br>
    <input type="radio" name="q1" value="10"> 10<br><br>

    <!-- Question 2 -->
    <p>2. What is 10 - 4?</p>
    <input type="radio" name="q2" value="5"> 5<br>
    <input type="radio" name="q2" value="6"> 6<br>
    <input type="radio" name="q2" value="7"> 7<br><br>

    <!-- Question 3 -->
    <p>3. What is 3 × 3?</p>
    <input type="radio" name="q3" value="6"> 6<br>
    <input type="radio" name="q3" value="9"> 9<br>
    <input type="radio" name="q3" value="12"> 12<br><br>

    <!-- Math symbols using ampersand notation -->
    <p>Math Symbols Example: 5 &lt; 10, 10 &gt; 5, 5 &amp; 5 = 10</p>

    <!-- Word problem -->
    <p>4. Word Problem:</p>
    <p>If you have 10 apples and give away 4, how many do you have left? Explain your answer:</p>
    <textarea rows="4" cols="40"></textarea><br><br>

    <!-- Submit button -->
    <button type="submit">Submit Test</button>

</form>

<!-- END OF TEST -->

</body>
</html>
